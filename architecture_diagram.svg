<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1280" font-family="Inter, -apple-system, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #0A0A0A; letter-spacing: -0.5px; }
      .subtitle { font-size: 13px; fill: #6B6B6B; }
      .box-label { font-size: 13px; font-weight: 600; fill: #0A0A0A; }
      .box-detail { font-size: 10px; fill: #6B6B6B; font-family: 'Geist Mono', 'SF Mono', monospace; }
      .flow-label { font-size: 9.5px; fill: #6B6B6B; font-family: 'Geist Mono', 'SF Mono', monospace; }
      .flow-label-bold { font-size: 9.5px; fill: #0A0A0A; font-weight: 600; font-family: 'Geist Mono', 'SF Mono', monospace; }
      .section-label { font-size: 11px; font-weight: 600; fill: #6B6B6B; letter-spacing: 1.5px; }
      .zk-badge-text { font-size: 9px; font-weight: 700; fill: #00A676; letter-spacing: 0.5px; }
      .zk-detail { font-size: 9.5px; fill: #00A676; font-family: 'Geist Mono', 'SF Mono', monospace; }
      .zk-panel-label { font-size: 11px; font-weight: 600; fill: #00A676; letter-spacing: 1.5px; }
      .panel-col-label { font-size: 10px; font-weight: 600; fill: #6B6B6B; letter-spacing: 1px; }
      .panel-mono { font-size: 9.5px; fill: #0A0A0A; font-family: 'Geist Mono', 'SF Mono', monospace; }
      .panel-desc { font-size: 9px; fill: #6B6B6B; }
      .arrow { stroke: #6B6B6B; stroke-width: 1.3; fill: none; }
      .arrow-zk { stroke: #00A676; stroke-width: 1.3; fill: none; stroke-dasharray: 5,3; }
      .legend-text { font-size: 10px; fill: #6B6B6B; }
    </style>
    <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6B6B6B"/>
    </marker>
    <marker id="arrow-head-zk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00A676"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1280" fill="#F5F3EE" rx="16"/>

  <!-- ══════════════════════════ HEADER ══════════════════════════ -->
  <text x="50" y="60" class="title">bullet</text>
  <text x="50" y="82" class="subtitle">zk-private payment architecture</text>

  <!-- Legend -->
  <line x1="740" y1="58" x2="770" y2="58" class="arrow"/>
  <text x="778" y="61" class="legend-text">data flow</text>
  <line x1="860" y1="58" x2="890" y2="58" class="arrow-zk"/>
  <text x="898" y="61" class="legend-text">zk proof flow</text>
  <rect x="1000" y="51" width="24" height="14" rx="7" fill="#FFFFFF" stroke="#00A676" stroke-width="1.5"/>
  <text x="1032" y="61" class="legend-text">zk component</text>

  <line x1="50" y1="102" x2="1150" y2="102" stroke="#E5E0DE" stroke-width="1"/>

  <!-- ══════════════════════════ SECTION LABELS ══════════════════════════ -->
  <text x="140" y="140" class="section-label" text-anchor="middle">PEOPLE</text>
  <text x="420" y="140" class="section-label" text-anchor="middle">FRONTEND</text>
  <text x="710" y="140" class="section-label" text-anchor="middle">BACKEND</text>
  <text x="1015" y="140" class="section-label" text-anchor="middle">ON-CHAIN · SOROBAN</text>

  <!-- ══════════════════════════ ROW 1 ══════════════════════════ -->

  <!-- Sender Wallet -->
  <rect x="50" y="160" width="180" height="76" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="140" y="192" class="box-label" text-anchor="middle">Freighter Wallet</text>
  <text x="140" y="209" class="box-detail" text-anchor="middle">signs deposit tx</text>

  <!-- Send Form -->
  <rect x="320" y="160" width="200" height="94" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="420" y="188" class="box-label" text-anchor="middle">Send Form</text>
  <text x="420" y="205" class="box-detail" text-anchor="middle">pick token + amount</text>
  <text x="420" y="220" class="box-detail" text-anchor="middle">compute commitment</text>

  <!-- Resolver API -->
  <rect x="610" y="160" width="200" height="90" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="710" y="188" class="box-label" text-anchor="middle">Resolver API</text>
  <text x="710" y="205" class="box-detail" text-anchor="middle">handle/email -&gt; pubkey</text>
  <text x="710" y="220" class="box-detail" text-anchor="middle">GET /path?commitment=</text>

  <!-- ZeekPay Contract -->
  <rect x="900" y="160" width="230" height="130" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="1015" y="188" class="box-label" text-anchor="middle">ZeekPay Contract</text>
  <text x="1015" y="205" class="box-detail" text-anchor="middle">deposit(commitment, amt)</text>
  <text x="1015" y="220" class="box-detail" text-anchor="middle">claim(proof, nullifier, ...)</text>
  <text x="1015" y="235" class="box-detail" text-anchor="middle">post_root(root)</text>
  <text x="1015" y="250" class="box-detail" text-anchor="middle">add_token(id, sac_addr)</text>

  <!-- ══════════════════════════ ROW 2 ══════════════════════════ -->

  <!-- Claim Link -->
  <rect x="50" y="420" width="180" height="90" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="140" y="450" class="box-label" text-anchor="middle">Claim Link</text>
  <text x="140" y="467" class="box-detail" text-anchor="middle">secret + recipientDigest</text>
  <text x="140" y="482" class="box-detail" text-anchor="middle">+ amount + tokenId</text>

  <!-- Claim Page -->
  <rect x="320" y="420" width="200" height="76" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="420" y="450" class="box-label" text-anchor="middle">Claim Page</text>
  <text x="420" y="467" class="box-detail" text-anchor="middle">decode link, connect wallet</text>

  <!-- Indexer -->
  <rect x="610" y="420" width="200" height="80" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="710" y="450" class="box-label" text-anchor="middle">Indexer</text>
  <text x="710" y="467" class="box-detail" text-anchor="middle">polls deposit events</text>
  <text x="710" y="482" class="box-detail" text-anchor="middle">posts Merkle root</text>

  <!-- ══════════════════════════ ROW 3 (ZK ROW) ══════════════════════════ -->

  <!-- Browser Prover -->
  <rect x="320" y="560" width="200" height="120" rx="16" fill="white" stroke="#00A676" stroke-width="1.5"/>
  <rect x="462" y="572" width="46" height="16" rx="8" fill="#EAF6F0"/>
  <text x="485" y="583" class="zk-badge-text" text-anchor="middle">ZK</text>
  <text x="340" y="602" class="box-label">Browser Prover</text>
  <text x="420" y="623" class="zk-detail" text-anchor="middle">snarkjs · WASM</text>
  <text x="420" y="638" class="zk-detail" text-anchor="middle">claim.wasm + claim.zkey</text>
  <text x="420" y="653" class="zk-detail" text-anchor="middle">groth16 fullProve, ~20s</text>

  <!-- Merkle Tree -->
  <rect x="610" y="560" width="200" height="120" rx="16" fill="white" stroke="#00A676" stroke-width="1.5"/>
  <rect x="752" y="572" width="46" height="16" rx="8" fill="#EAF6F0"/>
  <text x="775" y="583" class="zk-badge-text" text-anchor="middle">ZK</text>
  <text x="630" y="602" class="box-label">Merkle Tree</text>
  <text x="710" y="623" class="zk-detail" text-anchor="middle">poseidon hash · depth 20</text>
  <text x="710" y="638" class="zk-detail" text-anchor="middle">sparse incremental</text>
  <text x="710" y="653" class="zk-detail" text-anchor="middle">2^20 = 1M leaf capacity</text>

  <!-- Groth16 Verifier -->
  <rect x="900" y="560" width="230" height="110" rx="16" fill="white" stroke="#00A676" stroke-width="1.5"/>
  <rect x="1072" y="572" width="46" height="16" rx="8" fill="#EAF6F0"/>
  <text x="1095" y="583" class="zk-badge-text" text-anchor="middle">ZK</text>
  <text x="920" y="602" class="box-label">Groth16 Verifier</text>
  <text x="1015" y="623" class="zk-detail" text-anchor="middle">BLS12-381 · pairing_check</text>
  <text x="1015" y="638" class="zk-detail" text-anchor="middle">e(-A,B)*e(a,b)*e(L,g)*e(C,d)=1</text>
  <text x="1015" y="653" class="zk-detail" text-anchor="middle">~70% of 100M CPU budget</text>

  <!-- ══════════════════════════ ROW 4 ══════════════════════════ -->

  <!-- Postgres -->
  <rect x="610" y="720" width="200" height="70" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="710" y="750" class="box-label" text-anchor="middle">Postgres</text>
  <text x="710" y="767" class="box-detail" text-anchor="middle">leaves, cursor, identities</text>

  <!-- On-Chain Storage -->
  <rect x="900" y="720" width="230" height="90" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="1015" y="750" class="box-label" text-anchor="middle">On-Chain Storage</text>
  <text x="1015" y="767" class="box-detail" text-anchor="middle">nullifiers (persistent)</text>
  <text x="1015" y="782" class="box-detail" text-anchor="middle">roots (ring buffer x64)</text>
  <text x="1015" y="797" class="box-detail" text-anchor="middle">VK, token SAC addresses</text>

  <!-- ══════════════════════════ ROW 5 ══════════════════════════ -->

  <!-- SAC Tokens -->
  <rect x="900" y="850" width="230" height="70" rx="16" fill="white" stroke="#E5E0DE" stroke-width="1"/>
  <text x="1015" y="880" class="box-label" text-anchor="middle">SAC Tokens</text>
  <text x="1015" y="897" class="box-detail" text-anchor="middle">USDC (0) · XLM (1) · USDT (2)</text>

  <!-- ══════════════════════════ ARROWS ══════════════════════════ -->

  <!-- Sender -> Send Form -->
  <line x1="230" y1="198" x2="317" y2="207" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="255" y="182" width="30" height="14" fill="#F5F3EE"/>
  <text x="270" y="193" class="flow-label" text-anchor="middle">sign</text>

  <!-- Send Form -> Contract (deposit) -->
  <path d="M520,207 L545,207 L545,320 L855,320 L855,200 L897,200" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="590" y="304" width="220" height="14" fill="#F5F3EE"/>
  <text x="700" y="315" class="flow-label-bold" text-anchor="middle">deposit(commitment, amount, tokenId)</text>

  <!-- Send Form -> Claim Link -->
  <path d="M355,254 L172,417" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="228" y="330" width="70" height="14" fill="#F5F3EE"/>
  <text x="263" y="341" class="flow-label" text-anchor="middle">share link</text>

  <!-- Claim Link -> Claim Page -->
  <line x1="230" y1="465" x2="317" y2="458" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="255" y="449" width="30" height="14" fill="#F5F3EE"/>
  <text x="270" y="460" class="flow-label" text-anchor="middle">open</text>

  <!-- Claim Page -> Browser Prover -->
  <line x1="420" y1="496" x2="420" y2="557" class="arrow-zk" marker-end="url(#arrow-head-zk)"/>
  <rect x="403" y="518" width="34" height="14" fill="#F5F3EE"/>
  <text x="420" y="529" class="zk-detail" text-anchor="middle">prove</text>

  <!-- Browser Prover -> Resolver (GET /path) -->
  <path d="M520,620 L570,620 L570,205 L607,205" class="arrow-zk" marker-end="url(#arrow-head-zk)"/>
  <rect x="578" y="343" width="172" height="14" fill="#F5F3EE"/>
  <text x="584" y="354" class="zk-detail">GET /path?commitment=</text>

  <!-- Indexer -> Merkle Tree -->
  <line x1="710" y1="500" x2="710" y2="557" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="679" y="521" width="62" height="14" fill="#F5F3EE"/>
  <text x="710" y="532" class="flow-label" text-anchor="middle">insert leaf</text>

  <!-- Merkle Tree -> Postgres -->
  <line x1="710" y1="680" x2="710" y2="717" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="685" y="691" width="50" height="14" fill="#F5F3EE"/>
  <text x="710" y="702" class="flow-label" text-anchor="middle">persist</text>

  <!-- Contract -> Indexer (deposit events) -->
  <path d="M900,230 L875,230 L875,460 L813,460" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="881" y="296" width="90" height="14" fill="#F5F3EE"/>
  <text x="886" y="307" class="flow-label">deposit events</text>

  <!-- Indexer -> Contract (post_root) -->
  <path d="M810,440 L845,440 L845,260 L897,260" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="851" y="420" width="66" height="14" fill="#F5F3EE"/>
  <text x="857" y="431" class="flow-label">post_root</text>

  <!-- Browser Prover -> Contract (claim) -->
  <path d="M520,660 L595,660 L595,380 L1000,380 L1000,293" class="arrow-zk" marker-end="url(#arrow-head-zk)"/>
  <rect x="650" y="366" width="300" height="14" fill="#F5F3EE"/>
  <text x="800" y="377" class="zk-detail" text-anchor="middle">claim(proof_a, proof_b, proof_c, root, nullifier, ...)</text>

  <!-- Contract -> Verifier -->
  <line x1="1060" y1="290" x2="1060" y2="557" class="arrow-zk" marker-end="url(#arrow-head-zk)"/>
  <rect x="1030" y="417" width="60" height="14" fill="#F5F3EE"/>
  <text x="1060" y="428" class="zk-detail" text-anchor="middle">verify</text>

  <!-- Verifier -> Storage -->
  <line x1="1015" y1="670" x2="1015" y2="717" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="905" y="686" width="110" height="14" fill="#F5F3EE"/>
  <text x="960" y="697" class="flow-label" text-anchor="middle">record nullifier</text>

  <!-- Storage -> SAC -->
  <line x1="1015" y1="810" x2="1015" y2="847" class="arrow" marker-end="url(#arrow-head)"/>
  <rect x="994" y="821" width="42" height="14" fill="#F5F3EE"/>
  <text x="1015" y="832" class="flow-label" text-anchor="middle">transfer</text>

  <!-- ══════════════════════════ ZK PROOF DETAILS PANEL ══════════════════════════ -->
  <rect x="50" y="960" width="1080" height="280" rx="16" fill="white" stroke="#00A676" stroke-width="1"/>

  <text x="75" y="992" class="zk-panel-label">ZK PROOF DETAILS</text>
  <text x="75" y="1014" class="box-label">Circuit: claim.circom · Groth16 / BLS12-381 · depth-20 Poseidon Merkle</text>
  <line x1="75" y1="1028" x2="1105" y2="1028" stroke="#E5E0DE" stroke-width="1"/>

  <!-- Column 1: Public Inputs -->
  <text x="75" y="1055" class="panel-col-label">PUBLIC INPUTS</text>
  <text x="75" y="1076" class="panel-mono">root <tspan fill="#6B6B6B">· merkle root, contract-known</tspan></text>
  <text x="75" y="1096" class="panel-mono">nullifier <tspan fill="#6B6B6B">· poseidon(secret), blocks double-spend</tspan></text>
  <text x="75" y="1116" class="panel-mono">recipientDigest <tspan fill="#6B6B6B">· identity binding,</tspan></text>
  <text x="75" y="1132" class="panel-desc">blocks front-running</text>
  <text x="75" y="1152" class="panel-mono">amount <tspan fill="#6B6B6B">· stroop value, blocks mismatch</tspan></text>
  <text x="75" y="1172" class="panel-mono">tokenId <tspan fill="#6B6B6B">· 0=USDC 1=XLM 2=USDT,</tspan></text>
  <text x="75" y="1188" class="panel-desc">blocks cross-token drain</text>

  <line x1="410" y1="1040" x2="410" y2="1220" stroke="#E5E0DE" stroke-width="1"/>

  <!-- Column 2: Private Inputs -->
  <text x="435" y="1055" class="panel-col-label">PRIVATE INPUTS</text>
  <text x="435" y="1076" class="panel-mono">secret</text>
  <text x="435" y="1092" class="panel-desc">random 32-byte value, never leaves the browser</text>
  <text x="435" y="1118" class="panel-mono">pathElements[20]</text>
  <text x="435" y="1134" class="panel-desc">Merkle sibling hashes</text>
  <text x="435" y="1160" class="panel-mono">pathIndices[20]</text>
  <text x="435" y="1176" class="panel-desc">left/right path bits</text>

  <line x1="720" y1="1040" x2="720" y2="1220" stroke="#E5E0DE" stroke-width="1"/>

  <!-- Column 3: Constraints -->
  <text x="745" y="1055" class="panel-col-label">CONSTRAINTS</text>
  <text x="745" y="1076" class="panel-mono">nullifier = Poseidon(secret)</text>
  <text x="745" y="1092" class="panel-desc">domain-separated, arity-1</text>
  <text x="745" y="1118" class="panel-mono">commitment = Poseidon(secret,</text>
  <text x="745" y="1134" class="panel-mono">  recipientDigest, amount, tokenId)</text>
  <text x="745" y="1150" class="panel-desc">arity-4, binds identity and value to the leaf</text>
  <text x="745" y="1176" class="panel-mono">leaf is proven under root via 20 rounds</text>
  <text x="745" y="1192" class="panel-mono">of Poseidon(left, right)</text>
  <text x="745" y="1208" class="panel-desc">path bits and siblings stay private</text>

</svg>
